<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00be9b" />
      <stop offset="100%" stop-color="#008064" />
    </linearGradient>
  </defs>
  <!-- Background with slight rounded modern corners -->
  <rect width="512" height="512" rx="120" fill="url(#logo-grad)" />
  
  <!-- Sleek White Graduation Cap Silhouette (Symbol representing TuitionHub Smart Classroom) -->
